[build]
command = '''
echo "[netlify] branch=${BRANCH:-unknown} commit=${COMMIT_REF:-unknown}"
pwd
ls -lad index.html || true
node -e "const fs=require('fs');try{const s=fs.lstatSync('index.html');console.log('[netlify] index.html type='+(s.isDirectory()?'dir':s.isFile()?'file':'other'));}catch(e){console.log('[netlify] index.html missing')}"
npm run build
'''
publish = "dist"

[[headers]]
for = "/"
  [headers.values]
  Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
for = "/index.html"
  [headers.values]
  Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
for = "/sw.js"
  [headers.values]
  Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
for = "/assets/*"
  [headers.values]
  Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/unsplash-local/*"
  [headers.values]
  Cache-Control = "public, max-age=31536000, immutable"
